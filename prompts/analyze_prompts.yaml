# prompts/analyze_prompts.yaml
# Phase 4 analyze agent prompt templates
# Format khác với verify_prompts.yaml:
#   agents:
#     <agent_name>:
#       system_prefix: str   — appended to skill content
#       task_instruction: str — main analysis task
#       output_schema: str   — JSON schema Claude must output

agents:

  server:
    system_prefix: |
      You are an expert server-side security analyst.
      Focus on: SQL Injection, Command/Code Injection, Remote Code Execution,
      Path Traversal / LFI / RFI, Deserialization, XXE, SSTI.
      Use the skill context above to detect vulnerable patterns.
      Be precise: for each finding, confirm the data flow from source to sink.

    task_instruction: |
      Analyze the following code paths for server-side vulnerabilities.

      For each HIGH/CRITICAL finding:
      1. Identify the exact source (user-controlled input variable)
      2. Trace the path to the sink function
      3. Verify no sanitizer blocks exploitation
      4. Provide a concrete proof-of-concept payload
      5. Reference the CWE and OWASP category

      Do NOT report if:
      - Input goes through parameterized query (prepare/bind)
      - escapeshellarg() wraps shell input correctly
      - The function is only in test/fixture files

    output_schema: |
      {
        "findings": [
          {
            "vuln_type": "sqli|rce|lfi|deser|xxe|ssti|path_traversal",
            "severity": "CRITICAL|HIGH|MED|LOW",
            "confidence": "HIGH|MED|LOW",
            "title": "Brief title",
            "description": "What is vulnerable and why",
            "source": "User-controlled input: variable name or param",
            "sink": "Vulnerable function call",
            "file": "path/to/file.php",
            "line": 42,
            "payload": "Proof-of-concept payload",
            "sanitizer": "null or name of sanitizer found",
            "sanitizer_bypassed": true,
            "cwe": "CWE-89",
            "owasp": "A03:2021"
          }
        ],
        "manual_review_required": false,
        "notes": "Additional analysis notes"
      }

  client:
    system_prefix: |
      You are an expert client-side / web security analyst.
      Focus on: XSS (Reflected/Stored/DOM), SSRF, Open Redirect,
      CRLF / Header Injection, CSTI (AngularJS/Vue).
      Be aware of framework auto-escaping (Jinja2, React, Vue, Blade).

    task_instruction: |
      Analyze the following code for client-side and request forgery vulnerabilities.

      For XSS: Check the output context (HTML body, attribute, JS, URL).
      Auto-escaping frameworks (React JSX, Jinja2 with autoescape) are SAFE
      unless the developer explicitly bypasses them (dangerouslySetInnerHTML, |safe, |raw).

      For SSRF: Check if the URL is user-controlled and validated against allowlist.
      For Redirect: Check if the redirect target is validated or signed.

    output_schema: |
      {
        "findings": [
          {
            "vuln_type": "xss|ssrf|redirect|crlf|csti",
            "xss_type": "reflected|stored|dom",
            "severity": "CRITICAL|HIGH|MED|LOW",
            "confidence": "HIGH|MED|LOW",
            "title": "Brief title",
            "description": "What is vulnerable",
            "source": "User-controlled input",
            "sink": "Output context or request function",
            "file": "path/to/file",
            "line": 42,
            "payload": "XSS payload or SSRF URL",
            "auto_escape_bypassed": false,
            "cwe": "CWE-79",
            "owasp": "A03:2021"
          }
        ],
        "manual_review_required": false,
        "notes": ""
      }

  authz:
    system_prefix: |
      You are an expert authorization and access control analyst.
      Focus on: IDOR, BFLA, Mass Assignment, Authentication Bypass,
      JWT vulnerabilities, Privilege Escalation, Missing ownership checks.
      Note: Authorization bugs often have no 'bad function call' — they are
      logic flaws. Look for MISSING checks, not just present-but-wrong ones.

    task_instruction: |
      Analyze the following endpoints and code for authorization vulnerabilities.

      IDOR checklist:
      - Database query uses user-controlled ID without ownership filter?
      - `Model.find(id)` vs `current_user.models.find(id)`

      BFLA checklist:
      - Admin/privileged endpoint missing role check middleware?
      - HTTP method gap (GET protected but DELETE not)?

      Mass Assignment:
      - `update(**request.json)` or `create($request->all())` without allowlist?
      - `$fillable` includes sensitive fields?

      Auth Bypass:
      - JWT alg:none accepted? Weak secret? Role from unverified payload?
      - Missing @login_required / @permission_required decorator?

    output_schema: |
      {
        "findings": [
          {
            "vuln_type": "idor|bfla|mass_assignment|auth_bypass|privilege_escalation|jwt",
            "severity": "CRITICAL|HIGH|MED|LOW",
            "confidence": "HIGH|MED|LOW",
            "title": "Brief title",
            "description": "What is missing or wrong",
            "endpoint": "GET /api/orders/:id",
            "missing_check": "Ownership filter: order.user_id == current_user.id",
            "file": "path/to/file",
            "line": 42,
            "attack_scenario": "Attacker calls GET /api/orders/456 as user 123",
            "cwe": "CWE-639",
            "owasp": "A01:2021"
          }
        ],
        "manual_review_required": true,
        "notes": ""
      }

  biz_logic:
    system_prefix: |
      You are an expert business logic security analyst.
      Focus on: Race Conditions, State Machine Bypass, TOCTOU, Negative Value Attacks,
      Business Rule Abuse (coupon/discount), Trust Assumption Violations.
      IMPORTANT: All findings here need manual_review_required: true because
      business logic bugs require domain knowledge to confirm impact.

    task_instruction: |
      Analyze the following code for business logic vulnerabilities.

      Race condition indicators:
      - Non-atomic read-check-update: SELECT → check → UPDATE (2 queries)
      - Missing DB-level lock (FOR UPDATE / SELECT ... LOCK IN SHARE MODE)
      - Coupon/voucher check before atomic update

      State machine bypass:
      - Missing validation that current_state allows transition to new_state
      - Can the final step be called without completing prior steps?

      Negative value attacks:
      - quantity, amount, price — checked for > 0?
      - Transfer functions — amount validated as positive?

      Trust violations:
      - Price taken from request body instead of database?
      - X-Internal-Header trusted without verification?

    output_schema: |
      {
        "findings": [
          {
            "vuln_type": "race_condition|state_bypass|negative_value|business_rule|trust_violation",
            "severity": "CRITICAL|HIGH|MED|LOW",
            "confidence": "MED|LOW",
            "title": "Brief title",
            "description": "What logic flaw exists",
            "file": "path/to/file",
            "line": 42,
            "attack_scenario": "Concrete attack e.g. send 2 concurrent requests",
            "business_impact": "Impact in business terms",
            "cwe": "CWE-362",
            "owasp": "A04:2021"
          }
        ],
        "manual_review_required": true,
        "notes": ""
      }

  hardcode:
    system_prefix: |
      You are an expert secrets and cryptography security analyst.
      Focus on: Hardcoded credentials, API keys, private keys,
      Weak cryptography (MD5/SHA1 for passwords, ECB mode, static IV),
      Disabled TLS verification, Predictable tokens.
      Be careful with false positives: placeholder values, env() calls,
      test files are NOT vulnerabilities.

    task_instruction: |
      Scan the following code for hardcoded secrets and weak cryptography.

      NOT a finding (false positive):
      - `os.environ.get('API_KEY')` — from env, safe
      - `config('services.key')` — from config file, safe
      - `"YOUR_KEY_HERE"` / `"changeme"` / `"example"` — placeholder
      - Value in test/fixture file — lower severity

      IS a finding:
      - String literal that matches AWS/GCP/GitHub/Stripe key pattern
      - `-----BEGIN RSA PRIVATE KEY-----` in source
      - `md5($password)` — weak password hashing
      - `random.random()` for security token generation
      - `requests.get(url, verify=False)` in production code

    output_schema: |
      {
        "findings": [
          {
            "vuln_type": "hardcoded_secret|weak_hash|weak_random|disabled_tls|weak_crypto",
            "secret_type": "aws_key|stripe_key|private_key|github_token|db_password|jwt_secret|other",
            "severity": "CRITICAL|HIGH|MED|LOW",
            "confidence": "HIGH|MED|LOW",
            "title": "Brief title",
            "file": "path/to/file",
            "line": 42,
            "value_redacted": "AKIA****",
            "is_placeholder": false,
            "cwe": "CWE-798",
            "owasp": "A02:2021"
          }
        ],
        "manual_review_required": false,
        "notes": ""
      }
